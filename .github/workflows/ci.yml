name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
        env:
          # Valores dummy: el build no contacta el backend (las rutas son dinámicas
          # por cookies), pero garantizamos que las env vars existan por si acaso.
          API_URL: http://localhost:4000
          JWT_SECRET: ci-dummy-secret-not-used-at-build-time
